name: Docker Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      registry: ${{ steps.check-env.outputs.registry }}
      image_name: ${{ steps.check-env.outputs.image_name }}
    steps:
      - name: Check required environment variables and secrets
        id: check-env
        env:
          REGISTRY: ${{ vars.REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          if [ -z "$REGISTRY" ]; then
            echo "Error: REGISTRY (repository variable) is not set. Create it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$REGISTRY_USERNAME" ]; then
            echo "Error: REGISTRY_USERNAME (repository secret) is not set. Create it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "$REGISTRY_TOKEN" ]; then
            echo "Error: REGISTRY_TOKEN (repository secret) is not set. Create it in Settings > Secrets and variables > Actions."
            exit 1
          fi
          if [ -z "${{ env.IMAGE_NAME }}" ]; then
            echo "Error: IMAGE_NAME could not be derived from github.repository."
            exit 1
          fi
          echo "registry=$REGISTRY" >> "$GITHUB_OUTPUT"
          echo "image_name=${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

  backend:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.validate.outputs.registry }}/${{ needs.validate.outputs.image_name }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.validate.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: prod

  frontend:
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.validate.outputs.registry }}/${{ needs.validate.outputs.image_name }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=,suffix=,format=short
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ needs.validate.outputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_TOKEN }}

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: prod
